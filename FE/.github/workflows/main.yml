name: FE CI

on:
  push:
    paths:
      - "FE/**"
  pull_request:
    paths:
      - "FE/**"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FE

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: FE/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          CI: false
          REACT_APP_API_URL: http://localhost:4000/api